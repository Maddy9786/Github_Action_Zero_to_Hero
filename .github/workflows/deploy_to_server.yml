name: deploy build to server

on:

    workflow_dispatch:

jobs:
    
    deploy_build:
        runs-on: ubuntu-latest

        steps:

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.USERNAME }}
                password: ${{ secrets.PASSWORD }}
                script: whoami