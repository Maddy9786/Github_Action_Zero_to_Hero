name: deploy build to server

on:

    workflow_dispatch:

jobs:
    
    deploy_build:
        runs-on: ubuntu-latest

        steps:

            - name: Execute remote SSH commands using password
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.EC2_HOST }}
                username: ${{ secrets.EC2_USERNAME }}
                key: ${{ secrets.EC2_KEY }}
                script: |
                  echo "Successfully logged in"
                  whoami