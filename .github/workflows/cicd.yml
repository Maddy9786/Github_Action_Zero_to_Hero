name : CICD
on :
  workflow_dispatch: 
     inputs :   
       environments: 
         description: This is the enviroment where the workflows run
         default: 'stage'
         required: true
         type: choice 
         options:
            - dev
            - staging
            - prod
jobs:
    code :
       runs-on : ubuntu-latest
       steps:
         - name : pulling the code from github
           run : echo "Pulled the code from githuub"
        
    build :
      needs : code
      runs-on : ubuntu-latest
      steps:
       - name : building the code
         run : echo "build the code using docker"


    test :
      needs : [build]
      runs-on : ubuntu-latest
      steps:
        - name : testing the build
          run : echo "exec the docker build"     

    deploy :
      if : inputs.environments != 'prod'
      needs : [test]
      runs-on : ubuntu-latest
      steps:
        - name : deploying the code
          run : echo "running the code using docker compose"    
