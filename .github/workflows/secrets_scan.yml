name: secret scan

on: 
    workflow_dispatch:

jobs:

    secrets_scan:
        runs-on: ubuntu-latest

        steps:
        - name: code checkout
          uses: actions/checkout@v4
          with:
           fetch-depth: 0

        - name: gitleaks scan
          uses: gitleaks/gitleaks-action@v2
          env:
           GITHUB_TOKEN: ${{ secrets.GITHUBACTION_TOKEN }}   # Developer_setting_classic_token 
           
        

